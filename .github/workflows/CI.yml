name: CI pipeline

on:
  push:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Giao-Dien-MinBoo

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup Nodejs
      uses: actions/setup-node@v4
      with: 
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: ./Giao-Dien-MinBoo/package-lock.json
      
    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Checking syntax (Linting)
      run: npm run lint

    - name: Build Project
      run: npm run build