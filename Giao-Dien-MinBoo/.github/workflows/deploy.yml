name: Deploy MinBoo to GitHub Pages

# Kích hoạt khi push code lên nhánh Auth
on:
  push:
    branches: [ Auth ]

# Cấp quyền cho GitHub Actions deploy lên Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ cho 1 lần deploy chạy tại 1 thời điểm
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # =============================================
  # JOB 1: BUILD (Phần CI)
  # =============================================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code (Tải code xuống)
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies (Cài thư viện)
        run: npm ci

      - name: 🔨 Build project (Đóng gói)
        run: npm run build

      - name: 📤 Upload artifact (Tải kết quả lên)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # =============================================
  # JOB 2: DEPLOY (Phần CD)
  # =============================================
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
